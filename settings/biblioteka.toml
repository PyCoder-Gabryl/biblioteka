# Konfiguracja aplikacji Biblioteka

[app]
name = "Biblioteka"
version = "0.0.1"

[logging]
level = "DEBUG"

[logging.file]
path = "logs/app.log.json"
backup_dir = "logs/backup"

[logging.rotation]
max_backup_files = 100
max_backup_days = 14

[database]
path = "data/bibliotka.db"

[api.bn]
base_url = "https://data.bn.org.pl/api"

[api.fbc]
base_url = "https://fbc.pionier.net.pl"

[ui]
window_width = 1200
window_height = 800

[assets]
fonts_dir = "assets/fonts"
images_dir = "assets/images"
audio_dir = "assets/audio"

[ui.theme]
# Ciemno-pastelowe kolory
bg_dark = "#1E1E2E"
bg_medium = "#2D2D44"
bg_light = "#3D3D5C"
text_primary = "#E4E4F0"
text_secondary = "#A0A0B8"

# Kolory zakładek
tabs_bg = "#252538"
tabs_active = "#4A4A6A"
tabs_text = "#D0D0E8"
tabs_hover = "#3A3A58"

# Kolory poszczególnych zakładek
tab_dodaj = "#E74C3C"
tab_szukaj = "#3498DB"
tab_przegladaj = "#2ECC71"
tab_statystyki = "#9B59B6"
tab_logi = "#F39C12"
tab_ustawienia = "#1ABC9C"

[ui.panel]
max_height_ratio = 0.04
bg_color = "#0D0D14"
text_color = "#E4E4F0"
logi_height = 780
inne_height = 80

[ui.fonts]
tab_family = "JetBrains Mono"
tab_weight = 750
tab_size = 24
